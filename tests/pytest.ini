[pytest]
# Settings to control pytest behavior
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Display details about skipped tests
addopts = -v

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test category markers
markers =
    real_creds: Tests that require actual HubSpot credentials
    unit: Unit tests for individual components
    integration: Integration tests with external services
    performance: Performance and timeout tests
    edge_case: Edge case and error handling tests
