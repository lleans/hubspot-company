name: Build and Deploy to Nomad

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.staging
          push: true
          tags: ${{ secrets.REGISTRY_USER }}/hubspot-company:latest

      - name: Install Nomad CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install nomad -y

      - name: Deploy PostgreSQL to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
        run: |
          nomad job run nomad/postgres.hcl

      - name: Deploy App to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
        run: |
          sed -i "s/YOUR_DOCKERHUB_USERNAME/${{ secrets.REGISTRY_USER }}/g" nomad/hubspot.hcl
          nomad job run nomad/hubspot.hcl

      - name: Verify deployment
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
        run: |
          sleep 20
          nomad job status hubspot-company
