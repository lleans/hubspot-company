name: Build and Deploy to Nomad

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.staging
          push: true
          tags: ${{ secrets.REGISTRY_USER }}/hubspot-company:latest

      - name: Deploy PostgreSQL to Nomad
        run: |
          curl -s -X POST ${{ secrets.NOMAD_ADDR }}/v1/jobs \
            -H "Content-Type: application/json" \
            -d "{\"Job\": $(nomad job run -output nomad/postgres.hcl)}"

      - name: Deploy App to Nomad
        run: |
          # Replace placeholder with actual Docker Hub username
          sed -i "s/YOUR_DOCKERHUB_USERNAME/${{ secrets.REGISTRY_USER }}/g" nomad/hubspot.hcl
          
          curl -s -X POST ${{ secrets.NOMAD_ADDR }}/v1/jobs \
            -H "Content-Type: application/json" \
            -d "{\"Job\": $(nomad job run -output nomad/hubspot.hcl)}"

      - name: Verify deployment
        run: |
          sleep 15
          curl -f ${{ secrets.NOMAD_ADDR }}/v1/job/hubspot-company \
            | python3 -c "import sys,json; j=json.load(sys.stdin); print('Status:', j.get('Status'))"
